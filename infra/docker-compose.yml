# Local Postgres for API + bot development (Discord runs on Discord's infra).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
